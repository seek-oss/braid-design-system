allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: false
  core-js-pure: false
  esbuild: true
  nx: false
  sku: false
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@capsizecss/*'
  - '@sku-lib/*'
  - '@vanilla-extract/*'
  - browserslist-config-seek
  - eslint-config-seek
  - sku

packageExtensions:
  babel-plugin-remove-unused-vars:
    peerDependencies:
      '@babel/types': '*'

packages:
  - packages/*
  - integration
  - storybook
  - site
