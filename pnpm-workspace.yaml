allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: false
  core-js-pure: false
  esbuild: true
  nx: false
  sku: false
  unrs-resolver: true

minimumReleaseAgeExclude:
  - sku
  - '@sku-lib/*'

packages:
  - packages/*
  - integration
  - storybook
  - site

linkWorkspacePackages: 'deep'
preferWorkspacePackages: true

overrides:
  sku: 16.0.0-master-20260710012442
